services:
  backend:
    build: ./backend
    container_name: jwt-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=CHANGE_ME_IN_PRODUCTION_USE_A_STRONG_RANDOM_KEY
      - CORS_ORIGINS=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: jwt-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
